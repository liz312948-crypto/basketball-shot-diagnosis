services:
  - type: web
    name: basketball-shot-diagnosis
    runtime: python
    rootDir: .
    buildCommand: apt-get update && apt-get install -y fonts-noto-cjk && pip install -r requirements.txt
    startCommand: python -m app.web
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.12.10
