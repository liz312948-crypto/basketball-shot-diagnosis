<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投篮动作诊断</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel hero-panel">
      <div class="title-row">
        <div>
          <p class="eyebrow">投篮动作诊断</p>
          <h1>上传投篮视频，直接拿到中文诊断结果</h1>
          <p class="hero-copy">
            系统会先判断视频质量与机位，再决定只做基础诊断，还是继续进入增强诊断。
            结果页会直接嵌入诊断视频，并在识别到问题时插入定格画面，方便你直接看错在什么动作节点。
          </p>
        </div>
        <span class="badge">中文结果 / 精度优先</span>
      </div>

      <form id="uploadForm" action="/process" method="post" enctype="multipart/form-data">
        <label class="dropzone">
          <input id="videoInput" name="video" type="file" accept="video/*" required>
          <span>选择投篮视频</span>
          <small>支持短视频、单回合片段和较长训练视频，结果页可直接播放诊断视频</small>
        </label>
        <p id="uploadStatus" class="upload-status" aria-live="polite">
          当前是公网 demo，建议先上传 80MB 以内的短视频。大文件会先卡在上传阶段，然后分析时间也会明显变长。
        </p>

        <div class="tip-grid">
          <article class="tip-card">
            <h3>推荐拍法</h3>
            <p>优先侧面或 45 度，完整拍到准备、起跳、出手和跟随动作。</p>
          </article>
          <article class="tip-card">
            <h3>诊断策略</h3>
            <p>低质量视频会降级诊断，不会硬给高可信结论。</p>
          </article>
          <article class="tip-card">
            <h3>结果结构</h3>
            <p>先看总体结论和可信度，再看主要问题、训练建议、阶段拆解和定格诊断视频。</p>
          </article>
        </div>

        <button id="submitButton" type="submit">开始分析</button>
      </form>
    </section>
  </main>
  <script>
    const uploadForm = document.getElementById("uploadForm");
    const videoInput = document.getElementById("videoInput");
    const submitButton = document.getElementById("submitButton");
    const uploadStatus = document.getElementById("uploadStatus");

    function formatSize(bytes) {
      if (!bytes) return "0 MB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function selectedFile() {
      return videoInput && videoInput.files && videoInput.files[0] ? videoInput.files[0] : null;
    }

    function updateSelectedFileHint() {
      const file = selectedFile();
      if (!file || !uploadStatus) {
        return;
      }

      if (file.size > 200 * 1024 * 1024) {
        uploadStatus.textContent = `当前文件约 ${formatSize(file.size)}。这是大视频，上传到 Render 免费实例后，通常要先等上传完成，再等 2 到 4 分钟分析。`;
        return;
      }

      if (file.size > 80 * 1024 * 1024) {
        uploadStatus.textContent = `当前文件约 ${formatSize(file.size)}。可以继续上传，但等待时间通常会明显变长。`;
        return;
      }

      uploadStatus.textContent = `当前文件约 ${formatSize(file.size)}。这个体积更适合公网 demo，通常会更快进入分析。`;
    }

    if (videoInput) {
      videoInput.addEventListener("change", updateSelectedFileHint);
    }

    if (uploadForm) {
      uploadForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const file = selectedFile();

        if (!file) {
          if (uploadStatus) {
            uploadStatus.textContent = "请先选择要上传的投篮视频。";
          }
          return;
        }

        const formData = new FormData();
        formData.append("video", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/jobs");
        xhr.responseType = "json";

        if (submitButton) {
          submitButton.disabled = true;
          submitButton.textContent = "正在上传视频...";
        }

        if (uploadStatus) {
          uploadStatus.textContent = "正在上传视频 0%";
        }

        xhr.upload.addEventListener("progress", (progressEvent) => {
          if (!uploadStatus) {
            return;
          }
          if (progressEvent.lengthComputable && progressEvent.total > 0) {
            const percent = Math.min(100, Math.round((progressEvent.loaded / progressEvent.total) * 100));
            uploadStatus.textContent = `正在上传视频 ${percent}%`;
            return;
          }
          uploadStatus.textContent = "正在上传视频...";
        });

        xhr.addEventListener("load", () => {
          if (xhr.status !== 202) {
            if (submitButton) {
              submitButton.disabled = false;
              submitButton.textContent = "开始分析";
            }
            if (uploadStatus) {
              uploadStatus.textContent = "上传失败，请稍后重试。";
            }
            return;
          }

          const payload = xhr.response || {};
          if (!payload.job_id) {
            if (submitButton) {
              submitButton.disabled = false;
              submitButton.textContent = "开始分析";
            }
            if (uploadStatus) {
              uploadStatus.textContent = "上传成功，但任务创建失败，请刷新后重试。";
            }
            return;
          }

          if (uploadStatus) {
            uploadStatus.textContent = "视频已上传，正在进入分析页...";
          }
          window.location.href = `/jobs/${payload.job_id}`;
        });

        xhr.addEventListener("error", () => {
          if (submitButton) {
            submitButton.disabled = false;
            submitButton.textContent = "开始分析";
          }
          if (uploadStatus) {
            uploadStatus.textContent = "网络异常，上传失败，请稍后再试。";
          }
        });

        xhr.send(formData);
      });
    }
  </script>
</body>
</html>
